{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #059669;
            /* Green 600 */
            --primary-light: #10b981;
            /* Green 500 */
            --accent: #dc2626;
            /* Red 600 */
            --neutral-50: #f8fafc;
            --neutral-100: #f1f5f9;
            --neutral-200: #e2e8f0;
            --neutral-800: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--white);
            color: var(--neutral-800);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Split Screen Layout */
        .split-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Left Side - Branding */
        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            text-align: center;
            overflow: hidden;
        }

        /* Animated Background Orbs */
        .brand-section::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(5, 150, 105, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .brand-section::after {
            content: '';
            position: absolute;
            bottom: -15%;
            right: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.05);
            }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(5, 150, 105, 0.3);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
        }

        .particle:nth-child(1) {
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            left: 80%;
            top: 40%;
            animation-delay: 2s;
        }

        .particle:nth-child(3) {
            left: 30%;
            top: 70%;
            animation-delay: 4s;
        }

        .particle:nth-child(4) {
            left: 70%;
            top: 10%;
            animation-delay: 6s;
        }

        .particle:nth-child(5) {
            left: 50%;
            top: 50%;
            animation-delay: 8s;
        }

        @keyframes particleFloat {

            0%,
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            50% {
                transform: translateY(-100px) translateX(50px);
            }
        }

        .brand-logo {
            height: 350px;
            width: auto;
            margin-bottom: 2rem;
            position: relative;
            z-index: 10;
            animation: logoEntrance 1s ease-out;
            mix-blend-mode: multiply;
        }

        @keyframes logoEntrance {
            from {
                transform: translateY(-50px) scale(0.8);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .brand-title {
            font-size: 3rem;
            font-weight: 700;
            color: var(--neutral-800);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 10;
            animation: slideInLeft 0.8s ease-out 0.3s both;
        }

        .brand-subtitle {
            font-size: 1.2rem;
            color: var(--neutral-800);
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 4rem;
            position: relative;
            z-index: 10;
            animation: slideInLeft 0.8s ease-out 0.5s both;
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .brand-icons {
            display: flex;
            gap: 1.5rem;
            margin-top: auto;
            position: relative;
            z-index: 10;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: var(--white);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            color: var(--primary);
            font-size: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: iconPop 0.6s ease-out both;
        }

        .icon-box:nth-child(1) {
            animation-delay: 0.7s;
        }

        .icon-box:nth-child(2) {
            animation-delay: 0.85s;
        }

        .icon-box:nth-child(3) {
            animation-delay: 1s;
        }

        .icon-box:nth-child(4) {
            animation-delay: 1.15s;
        }

        .icon-box:nth-child(5) {
            animation-delay: 1.3s;
        }

        @keyframes iconPop {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .icon-box:hover {
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 20px 40px rgba(5, 150, 105, 0.2);
            color: var(--primary-light);
        }

        .icon-box i {
            animation: iconBounce 2s ease-in-out infinite;
        }

        .icon-box:nth-child(1) i {
            animation-delay: 0s;
        }

        .icon-box:nth-child(2) i {
            animation-delay: 0.3s;
        }

        .icon-box:nth-child(3) i {
            animation-delay: 0.6s;
        }

        .icon-box:nth-child(4) i {
            animation-delay: 0.9s;
        }

        .icon-box:nth-child(5) i {
            animation-delay: 1.2s;
        }

        @keyframes iconBounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* Right Side - Login Form */
        .login-section {
            flex: 1;
            background: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideInRight 0.8s ease-out 0.2s both;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .login-header h2 {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }

        .login-header h2::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
            animation: underlineExpand 0.6s ease-out 0.8s both;
        }

        @keyframes underlineExpand {
            from {
                width: 0;
            }

            to {
                width: 60px;
            }
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 3rem;
            margin-top: 1.5rem;
        }

        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
            animation: formFieldSlide 0.5s ease-out both;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.9s;
        }

        .form-group:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes formFieldSlide {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--neutral-100);
            border: 2px solid transparent;
            border-radius: 50px;
            font-size: 0.95rem;
            color: var(--neutral-800);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            background: var(--white);
            border-color: var(--accent);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.15);
            transform: translateY(-2px);
        }

        .form-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-light);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .form-control:focus+.form-icon {
            transform: translateY(-50%) scale(1.1);
            color: var(--primary);
        }

        .password-toggle {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--accent);
            transform: translateY(-50%) scale(1.1);
        }

        label {
            display: none;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent) 0%, #b91c1c 100%);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(220, 38, 38, 0.3);
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            animation: buttonSlide 0.5s ease-out 1.1s both;
        }

        @keyframes buttonSlide {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(220, 38, 38, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.9rem;
            animation: fadeIn 0.5s ease-out 1.2s both;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .btn-secondary {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            background: var(--white);
            color: var(--neutral-800);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            margin-bottom: 1.5rem;
            animation: buttonSlide 0.5s ease-out 1.3s both;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: #f0fdf4;
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.1);
        }

        .btn-secondary i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-secondary:hover i {
            transform: scale(1.1) rotate(5deg);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .forgot-link {
            color: var(--primary-light);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-light);
            transition: width 0.3s ease;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        .forgot-link:hover {
            color: var(--primary);
            transform: translateX(3px);
        }

        .messages {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #15803d;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            list-style-type: none;
            font-size: 0.9rem;
            text-align: left;
            border-left: 4px solid var(--primary);
            animation: messageSlide 0.5s ease-out;
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.1);
        }

        @keyframes messageSlide {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Security badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease-out 1.2s both;
        }

        .security-badge i {
            color: #10b981;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .brand-title {
                font-size: 2.5rem;
            }

            .brand-subtitle {
                font-size: 1.1rem;
            }

            .brand-logo {
                height: 280px;
            }

            .icon-box {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }
        }

        @media (max-width: 900px) {
            .split-container {
                flex-direction: column;
            }

            .brand-section {
                padding: 3rem 2rem;
                min-height: 60vh;
            }

            .brand-logo {
                height: 180px;
                margin-bottom: 1.5rem;
            }

            .brand-title {
                font-size: 2.2rem;
            }

            .brand-subtitle {
                font-size: 1rem;
                margin-bottom: 2rem;
            }

            .brand-icons {
                margin-top: 2rem;
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }

            .icon-box {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .login-section {
                padding: 3rem 2rem;
                border-top-left-radius: 30px;
                border-top-right-radius: 30px;
                margin-top: -30px;
                box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.05);
                min-height: auto;
            }

            .login-header h2 {
                font-size: 2rem;
            }

            .particle {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .brand-section {
                padding: 2.5rem 1.5rem;
                min-height: 50vh;
            }

            .brand-logo {
                height: 140px;
                margin-bottom: 1rem;
            }

            .brand-title {
                font-size: 1.8rem;
            }

            .brand-subtitle {
                font-size: 0.9rem;
                letter-spacing: 1.5px;
                margin-bottom: 1.5rem;
            }

            .brand-icons {
                gap: 0.8rem;
                margin-top: 1.5rem;
            }

            .icon-box {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
                border-radius: 12px;
            }

            .login-section {
                padding: 2.5rem 1.5rem;
                margin-top: -20px;
            }

            .login-container {
                max-width: 100%;
            }
        }

        @media (max-width: 400px) {
            .brand-section {
                padding: 2rem 1rem;
            }

            .brand-logo {
                height: 120px;
            }

            .brand-title {
                font-size: 1.5rem;
            }

            .brand-subtitle {
                font-size: 0.8rem;
                letter-spacing: 1px;
            }

            .brand-icons {
                gap: 0.6rem;
            }

            .icon-box {
                width: 40px;
                height: 40px;
                font-size: 1rem;
                border-radius: 10px;
            }

            .login-section {
                padding: 2rem 1rem;
            }

            .login-header h2 {
                font-size: 1.6rem;
            }

            .login-header h2::after {
                width: 50px;
            }

            .form-control {
                padding: 0.85rem 0.85rem 0.85rem 2.6rem;
                font-size: 0.85rem;
            }

            .form-group {
                margin-bottom: 1.2rem;
            }

            .divider {
                margin: 1rem 0;
                font-size: 0.8rem;
            }

            .btn-secondary {
                padding: 0.85rem;
                font-size: 0.85rem;
            }

            .btn-secondary i {
                font-size: 1rem;
            }
        }

        @media (min-width: 1400px) {
            .brand-logo {
                height: 400px;
            }

            .brand-title {
                font-size: 3.5rem;
            }

            .brand-subtitle {
                font-size: 1.3rem;
            }

            .icon-box {
                width: 70px;
                height: 70px;
                font-size: 1.7rem;
            }

            .login-header h2 {
                font-size: 2.8rem;
            }

            .login-container {
                max-width: 450px;
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
            border-color: var(--accent) !important;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        /* Loading spinner for button */
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="split-container">
        <!-- Left Side: Branding -->
        <div class="brand-section">
            <!-- Floating particles -->
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>

            <img src="{% static 'ulo.png' %}" alt="Logo" class="brand-logo">
            <h1 class="brand-title">Welcome Back</h1>
            <p class="brand-subtitle">User Portal</p>

            <div class="brand-icons">
                <div class="icon-box" title="Browse Products"><i class="fas fa-shopping-bag"></i></div>
                <div class="icon-box" title="View Orders"><i class="fas fa-box-open"></i></div>
                <div class="icon-box" title="Track Shipments"><i class="fas fa-truck"></i></div>
                <div class="icon-box" title="Customer Support"><i class="fas fa-headset"></i></div>
                <div class="icon-box" title="Secure Payments"><i class="fas fa-shield-alt"></i></div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-section">
            <div class="login-container">
                <div class="login-header">
                    <h2>Login</h2>
                    <p>Access your account</p>
                </div>

                <form method="post" id="loginForm">
                    {% csrf_token %}

                    {% if messages %}
                    <ul class="messages">
                        {% for message in messages %}
                        <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                    {% endif %}

                    <!-- Step 1: Email or Phone Input -->
                    <div id="emailSection">
                        <div class="form-group">
                            <input type="text" name="email" id="id_email" class="form-control" placeholder="Email Address or Phone Number" required>
                            <i class="fas fa-user form-icon"></i>
                        </div>
                        <button type="button" id="getOtpBtn" class="btn-primary">
                            <span>Get OTP</span>
                        </button>
                    </div>

                    <!-- Step 2: OTP Input (Hidden initially) -->
                    <div id="otpSection" style="display: none;">
                        <div class="form-group">
                            <input type="text" name="otp" id="id_otp" class="form-control" placeholder="Enter 6-Digit OTP" maxlength="6">
                            <i class="fas fa-key form-icon"></i>
                        </div>
                        
                        <div id="otpDisplay" style="background: #f0fdf4; color: #15803d; padding: 0.8rem; border-radius: 12px; margin-bottom: 1rem; font-weight: 600; display: none;">
                            Your OTP is: <span id="otpValue"></span>
                            <div style="font-size: 0.8rem; font-weight: 400; margin-top: 4px;">Valid for 5 minutes</div>
                        </div>

                        <button type="submit" class="btn-primary">
                            <span>Login</span>
                        </button>

                        <div style="text-align: center; margin-bottom: 1.5rem;">
                            <a href="#" id="resendOtp" class="forgot-link">Resend OTP</a>
                        </div>
                    </div>

                    <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn-secondary" style="margin-bottom: 0;">
                        <i class="fab fa-google" style="color: #DB4437;"></i>
                        <span>Continue with Google</span>
                    </a>


                    <div class="security-badge">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure Connection</span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const emailSection = document.getElementById('emailSection');
        const otpSection = document.getElementById('otpSection');
        const getOtpBtn = document.getElementById('getOtpBtn');
        const resendOtp = document.getElementById('resendOtp');
        const otpDisplay = document.getElementById('otpDisplay');
        const otpValue = document.getElementById('otpValue');
        const emailInput = document.getElementById('id_email');
        const loginForm = document.getElementById('loginForm');

        function generateOtp() {
            const email = emailInput.value.trim();
            if (!email) {
                emailInput.classList.add('shake');
                setTimeout(() => emailInput.classList.remove('shake'), 500);
                return;
            }

            getOtpBtn.classList.add('loading');
            
            const formData = new FormData();
            formData.append('email', email);
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            fetch("{% url 'generate_user_otp' %}", {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                getOtpBtn.classList.remove('loading');
                if (data.success) {
                    emailSection.style.display = 'none';
                    otpSection.style.display = 'block';
                    otpDisplay.style.display = 'block';
                    otpValue.textContent = data.otp;
                } else {
                    alert(data.message || 'Error generating OTP');
                }
            })
            .catch(error => {
                getOtpBtn.classList.remove('loading');
                console.error('Error:', error);
                alert('Something went wrong. Please try again.');
            });
        }

        getOtpBtn.addEventListener('click', generateOtp);
        resendOtp.addEventListener('click', (e) => {
            e.preventDefault();
            generateOtp();
        });

        // Form Validation for Login
        loginForm.addEventListener('submit', function (e) {
            if (otpSection.style.display === 'block') {
                const otpInput = document.getElementById('id_otp');
                if (!otpInput.value.trim() || otpInput.value.length !== 6) {
                    e.preventDefault();
                    otpInput.classList.add('shake');
                    setTimeout(() => otpInput.classList.remove('shake'), 500);
                    return;
                }
                
                // Show loading state on login button
                const btn = this.querySelector('button[type="submit"]');
                btn.classList.add('loading');
                btn.querySelector('span').style.opacity = '0';
            }
        });

        // Input focus animations
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.style.transform = 'translateY(-2px)';
            });

            input.addEventListener('blur', function () {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>

</html>
